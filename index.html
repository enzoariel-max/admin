<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin VIP | Casino Rey</title>
    
    <!-- SCRIPTS DE FIREBASE (MANTENIDOS) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <style>
        :root { 
            --bg: #06090f; 
            --card: #11161d; 
            --gold: #d4af37; 
            --text: #8e9aaf;
            --radius: 20px; /* Bordes muy redondeados */
        }

        body { 
            background: var(--bg); 
            color: white; 
            font-family: 'Montserrat', sans-serif; 
            margin: 0; 
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        /* --- LOGIN REDONDEADO --- */
        #login-screen { 
            position: fixed; top:0; left:0; width: 100%; height: 100%; 
            background: radial-gradient(circle at center, #1a202c 0%, #06090f 100%);
            display: flex; justify-content: center; align-items: center; z-index: 10000;
        }
        .login-box { 
            background: var(--card); 
            padding: 40px 30px; 
            border-radius: var(--radius); 
            border: 1px solid rgba(212, 175, 55, 0.2); 
            width: 85%; 
            max-width: 350px; 
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        /* --- HEADER CELULAR --- */
        #admin-panel { display: none; flex-direction: column; min-height: 100vh; }
        
        .header-mobile { 
            background: #030508; 
            padding: 20px; 
            border-bottom: 1px solid #1a202c;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header-mobile h2 { color: var(--gold); font-size: 1.2rem; margin: 0; font-weight: 900; }

        .main { padding: 20px; flex: 1; }

        /* --- TARJETAS DE CUPONES --- */
        .container-cupones { margin-top: 10px; }

        .card-cupon {
            background: var(--card);
            border-radius: var(--radius);
            padding: 20px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #1a202c;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .info-cupon h4 { margin: 0; font-size: 1.3rem; color: var(--gold); }
        .info-cupon p { margin: 5px 0 0; font-size: 0.9rem; color: var(--text); }

        /* --- BOTONES PREMIUM --- */
        .btn { 
            padding: 12px 25px; 
            border-radius: 15px; 
            cursor: pointer; 
            border: none; 
            font-weight: 900; 
            transition: 0.3s;
            text-transform: uppercase;
            font-size: 0.8rem;
        }
        .btn-gold { background: var(--gold); color: black; box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3); }
        .btn-outline { background: transparent; border: 2px solid var(--gold); color: var(--gold); }
        .btn:active { transform: scale(0.95); }

        .btn-reset { 
            background: #9b2c2c; 
            color: white; 
            width: 100%; 
            margin-top: 30px;
            padding: 18px;
            border-radius: var(--radius);
        }

        input { 
            width: 100%; 
            padding: 15px; 
            margin-bottom: 15px; 
            background: #000; 
            border: 1px solid #2d3748; 
            color: white; 
            border-radius: 15px; 
            font-size: 16px; 
            box-sizing: border-box;
        }

        .status { font-size: 0.7rem; font-weight: bold; margin-bottom: 5px; display: block; letter-spacing: 1px; }
        .status-bloqueado { color: #fc8181; }
        .status-libre { color: #68d391; }

    </style>
</head>
<body>

    <!-- LOGIN -->
    <div id="login-screen">
        <div class="login-box">
            <h2 style="color:var(--gold); margin-bottom:25px;">ADMIN VIP</h2>
            <input type="text" id="adminEmail" placeholder="Usuario">
            <input type="password" id="adminPass" placeholder="Contraseña">
            <button class="btn btn-gold" style="width:100%" onclick="login()">ENTRAR</button>
            <p onclick="seguridadGmail()" style="color:var(--text); font-size: 0.8rem; margin-top: 25px; text-decoration: underline; cursor:pointer;">¿Olvidaste la clave?</p>
        </div>
    </div>

    <!-- PANEL -->
    <div id="admin-panel">
        <header class="header-mobile">
            <h2>CASINO REY VIP</h2>
            <button class="btn btn-outline" style="padding: 8px 15px;" onclick="logout()">SALIR</button>
        </header>

        <main class="main">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <h3 style="margin:0; font-size: 1.1rem;">Cupones Activos</h3>
                <span id="userLogged" style="font-size: 0.7rem; color: var(--gold); font-weight: bold;"></span>
            </div>

            <!-- Aquí se inyectan las tarjetas -->
            <div id="cuerpoTarjetas" class="container-cupones"></div>

            <button class="btn btn-reset" onclick="resetearTodos()">⚠️ REACTIVAR TODO EL SISTEMA</button>
        </main>
    </div>

    <script>
const firebaseConfig = {
  apiKey: "AIzaSyB3CWqVqFw3fw7EOk_uqwZCkbowHZSdRFs",
  authDomain: "ruleta-rey-v2.firebaseapp.com",
  projectId: "ruleta-rey-v2",
  storageBucket: "ruleta-rey-v2.appspot.com",
  messagingSenderId: "925607172632",
  appId: "1:925607172632:web:7f4b59dc96637c3aed416d"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();
// --- COPIA ESTO ---
function login() {
    const userInput = document.getElementById('adminEmail').value.trim();
    const pass = document.getElementById('adminPass').value.trim();

    if(!userInput || !pass) return alert("Por favor, completa los campos");

    // Truco para entrar solo con nombre de usuario
    const emailFinal = userInput.includes('@') ? userInput : `${userInput}@casino.com`;

    auth.signInWithEmailAndPassword(emailFinal, pass)
        .then(() => {
            console.log("Sesión iniciada");
        })
        .catch(e => {
            console.error(e);
            alert("Error: Usuario o contraseña incorrectos");
        });
}
// --- HASTA AQUÍ ---


// CARGAR DATOS (CORREGIDO PARA TUS DIVS)
function cargarDatos() {
    // IMPORTANTE: idCupon debe existir en tu base de datos para ordenar
    db.collection("jugadores").orderBy("idCupon", "desc").onSnapshot(snapshot => {
        const contenedor = document.getElementById("cuerpoTarjetas"); // ID CORREGIDO
        if (!contenedor) return;
        
        contenedor.innerHTML = ""; 
        snapshot.forEach(doc => {
            const d = doc.data();
            const esBloqueado = d.estado === "bloqueado";
            
            // Usamos la clase card-cupon que ya tienes en tu CSS
            contenedor.innerHTML += `
                <div class="card-cupon">
                    <div class="info-cupon">
                        <span class="status ${esBloqueado ? 'status-bloqueado' : 'status-libre'}">
                            ● ${esBloqueado ? 'BLOQUEADO' : 'LIBRE'}
                        </span>
                        <h4>#${d.idCupon || '----'}</h4>
                        <p>Premio: ${d.premio || 'Sin premio'}</p>
                    </div>
                    <button class="btn ${esBloqueado ? 'btn-gold' : 'btn-outline'}" 
                            onclick="cambiarEstado('${doc.id}', '${d.estado}')">
                        ${esBloqueado ? 'LIBERAR' : 'BLOQUEAR'}
                    </button>
                </div>
            `;
        });
    }, error => {
        console.error("Error en Firestore:", error);
    });
}

// CAMBIAR ESTADO
function cambiarEstado(id, actual) {
    const nuevo = actual === "bloqueado" ? "liberado" : "bloqueado";
    db.collection("jugadores").doc(id).update({ estado: nuevo });
}

// RESET TOTAL
async function resetearTodos() {
    if(!confirm("¿Reactivar todos los cupones bloqueados?")) return;
    try {
        const snapshot = await db.collection("jugadores").where("estado", "==", "bloqueado").get();
        const batch = db.batch();
        snapshot.forEach(doc => {
            batch.update(doc.ref, { estado: "liberado" });
        });
        await batch.commit();
        alert("¡Sistema reseteado!");
    } catch(e) { alert("Error: " + e.message); }
}

// MONITOR DE SESIÓN
auth.onAuthStateChanged(user => {
    const loginScreen = document.getElementById('login-screen');
    const adminPanel = document.getElementById('admin-panel');
    if (user) {
        loginScreen.style.display = 'none';
        adminPanel.style.display = 'flex';
        document.getElementById('userLogged').innerText = user.email.split('@')[0];
        cargarDatos();
    } else {
        loginScreen.style.display = 'flex';
        adminPanel.style.display = 'none';
    }
});

function logout() { auth.signOut().then(() => location.reload()); }

function seguridadGmail() {
    const email = document.getElementById('adminEmail').value || (auth.currentUser ? auth.currentUser.email : null);
    if(!email) return alert("Escribe tu usuario/mail");
    const emailFinal = email.includes('@') ? email : email + "@casino.com";
    auth.sendPasswordResetEmail(emailFinal).then(() => alert("Mail enviado"));
}
</script>
</body>
</html>
