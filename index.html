<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel de Control VIP | Casino Rey</title>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    
    <style>
        :root { --bg: #06090f; --card: #11161d; --gold: #d4af37; --text: #8e9aaf; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; overflow: hidden; }
        
        /* LOGIN */
        #login-screen { position: fixed; top:0; left:0; width: 100%; height: 100%; background: radial-gradient(circle, #1a202c 0%, #06090f 100%); display: flex; justify-content: center; align-items: center; z-index: 9999; }
        .login-box { background: var(--card); padding: 40px; border-radius: 12px; border: 1px solid var(--gold); width: 300px; text-align: center; }

        /* PANEL */
        #admin-panel { display: none; height: 100vh; display: flex; }
        .sidebar { width: 240px; background: #030508; border-right: 1px solid #1a202c; padding: 20px; display: flex; flex-direction: column; }
        .sidebar h2 { color: var(--gold); font-size: 1rem; border-bottom: 1px solid #1a202c; padding-bottom: 15px; margin-bottom: 20px; }
        .main { flex: 1; padding: 30px; overflow-y: auto; }
        
        /* TABLA */
        .tabla-cupones { width: 100%; border-collapse: collapse; background: var(--card); border-radius: 8px; overflow: hidden; margin-top: 20px; }
        th { text-align: left; padding: 15px; background: #1a202c; color: var(--text); font-size: 0.75rem; }
        td { padding: 15px; border-bottom: 1px solid #030508; }

        input { width: 100%; padding: 12px; margin-bottom: 15px; background: #000; border: 1px solid #2d3748; color: white; border-radius: 5px; box-sizing: border-box; }
        .btn { padding: 10px 18px; border-radius: 5px; cursor: pointer; border: none; font-weight: bold; transition: 0.3s; }
        .btn-gold { background: var(--gold); color: black; }
        .btn-reset { background: #9b2c2c; color: white; margin-left: 10px; }
        .btn-outline { background: transparent; border: 1px solid var(--gold); color: var(--gold); }
    </style>
</head>
<body>

    <!-- LOGIN -->
    <div id="login-screen">
        <div class="login-box">
            <h2 style="color:var(--gold)">ACCESO EQUIPO</h2>
            <input type="email" id="adminEmail" placeholder="Gmail Administrador">
            <input type="password" id="adminPass" placeholder="Contraseña">
            <button class="btn btn-gold" style="width:100%" onclick="login()">ENTRAR</button>
            <p onclick="seguridadGmail()" style="color:var(--text); font-size: 0.7rem; margin-top: 15px; cursor: pointer;">¿Olvidaste la clave? Enviar a Gmail</p>
        </div>
    </div>

    <!-- PANEL -->
    <div id="admin-panel">
        <div class="sidebar">
            <h2>CASINO REY VIP</h2>
            <div style="background: #d4af3722; color: var(--gold); padding: 10px; border-radius: 5px; font-size: 0.9rem;">🎰 Ruleta Activa</div>
            <div style="margin-top: auto; padding-top: 20px; border-top: 1px solid #1a202c;">
                <button class="btn-outline" style="width:100%; margin-bottom: 10px;" onclick="seguridadGmail()">SEGURIDAD GMAIL</button>
                <button class="btn-outline" style="width:100%; border-color: #fc8181; color: #fc8181;" onclick="logout()">CERRAR SESIÓN</button>
            </div>
        </div>

        <div class="main">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h1>Gestión de Cupones</h1>
                <button class="btn btn-reset" onclick="resetearTodos()">⚠️ REACTIVAR TODO EL SISTEMA</button>
            </div>
            
            <table class="tabla-cupones">
                <thead>
                    <tr>
                        <th>ID CUPÓN</th>
                        <th>PREMIO</th>
                        <th>ESTADO</th>
                        <th>ACCIÓN</th>
                    </tr>
                </thead>
                <tbody id="cuerpoTabla">
                    <!-- Datos cargados de Firebase -->
                </tbody>
            </table>
        </div>
    </div>

<script>
    // DATOS REALES CONECTADOS
const firebaseConfig = {
  apiKey: "AIzaSyB3CWqVqFw3fw7EOk_uqwZCkbowHZSdRFs",
  authDomain: "ruleta-rey-v2.firebaseapp.com",
  projectId: "ruleta-rey-v2",
  storageBucket: "ruleta-rey-v2.firebasestorage.app",
  messagingSenderId: "925607172632",
  appId: "1:925607172632:web:7f4b59dc96637c3aed416d"
};

// Initialize Firebase
const app = initializeApp(firebaseConfig)

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    // LOGIN
   function login() {
    const usuarioIngresado = document.getElementById('adminEmail').value.trim();
    const pass = document.getElementById('adminPass').value.trim();

    // Si el usuario no escribió un @, le ponemos el dominio por defecto
    const emailTecnico = usuarioIngresado.includes('@') 
        ? usuarioIngresado 
        : usuarioIngresado + "@casino.com";

    auth.signInWithEmailAndPassword(emailTecnico, pass)
        .then(() => {
            console.log("¡Acceso concedido como: " + usuarioIngresado);
        })
        .catch((error) => {
            alert("Acceso denegado. Verificá tu usuario o contraseña.");
        });
}

    // SEGURIDAD GMAIL
    function seguridadGmail() {
        const email = document.getElementById('adminEmail').value || (auth.currentUser ? auth.currentUser.email : null);
        if(!email) return alert("Escribe tu Gmail en el campo de usuario");
        auth.sendPasswordResetEmail(email).then(() => alert("Link de seguridad enviado a tu Gmail."));
    }

    // CARGAR CUPONES
    function cargarDatos() {
        db.collection("jugadores").orderBy("idCupon", "desc").onSnapshot(snapshot => {
            const tabla = document.getElementById("cuerpoTabla");
            tabla.innerHTML = "";
            snapshot.forEach(doc => {
                const d = doc.data();
                const esBloqueado = d.estado === "bloqueado";
                tabla.innerHTML += `
                    <tr>
                        <td>#${d.idCupon}</td>
                        <td>${d.premio}</td>
                        <td style="color: ${esBloqueado ? '#fc8181' : '#68d391'}">${esBloqueado ? 'BLOQUEADO' : 'LIBRE'}</td>
                        <td>
                            <button class="btn btn-gold" onclick="cambiarEstado('${doc.id}', '${d.estado}')">
                                ${esBloqueado ? 'LIBERAR' : 'BLOQUEAR'}
                            </button>
                        </td>
                    </tr>
                `;
            });
        });
    }

    function cambiarEstado(id, actual) {
        const nuevo = actual === "bloqueado" ? "liberado" : "bloqueado";
        db.collection("jugadores").doc(id).update({ estado: nuevo });
    }

    // --- FUNCIÓN DE RESET TOTAL ---
    async function resetearTodos() {
        if(!confirm("¿Estás seguro? Esto permitirá que TODOS los jugadores del historial vuelvan a usar la ruleta.")) return;
        
        const snapshot = await db.collection("jugadores").where("estado", "==", "bloqueado").get();
        const batch = db.batch();
        
        snapshot.forEach(doc => {
            batch.update(doc.ref, { estado: "liberado" });
        });

        await batch.commit();
        alert("¡Sistema reseteado! Todos los cupones están libres nuevamente.");
    }
// --- PASO 3: MONITOR DE SESIÓN ACTUALIZADO ---
firebase.auth().onAuthStateChanged(user => {
    const loginScreen = document.getElementById('login-screen');
    const adminPanel = document.getElementById('admin-panel');

    if (user) {
        // Si el usuario existe: entramos al panel
        loginScreen.style.display = 'none';
        adminPanel.style.display = 'flex';
        
        // Mostramos el nombre en la barra lateral (si existe el elemento)
        if(document.getElementById('userLogged')) {
            document.getElementById('userLogged').innerText = user.displayName || user.email;
        }
        
        // Cargamos los cupones reales
        cargarDatos(); 
        
    } else {
        // Si no hay sesión: mostramos login
        loginScreen.style.display = 'flex';
        adminPanel.style.display = 'none';
    }
});

// FUNCIÓN PARA SALIR
function logout() { 
    firebase.auth().signOut().then(() => {
        location.reload(); // Recarga para volver al login limpio
    });
}

</script>
</body>
</html>
